<style>
  :root{

    --line:#23232e; --accent:#e8b44f; --live:#ff3b30;
    color-scheme:dark;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--fg);
    font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    max-width:760px;margin:0 auto;padding:28px 16px 60px;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  header{margin-bottom:34px}
  .wordmark{font-size:22px;font-weight:800;letter-spacing:.42em;text-indent:.42em;text-align:center}
  .tagline{color:var(--dim);font-size:12.5px;text-align:center;letter-spacing:.14em;text-transform:uppercase;margin-top:6px}
  section{margin-bottom:40px}
  h2{
    font-size:12.5px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
    color:var(--dim);display:flex;align-items:center;gap:10px;margin-bottom:14px;
  }
  h2::after{content:"";flex:1;height:1px;background:var(--line)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px}
  .card h3{font-size:17px;font-weight:700;line-height:1.3}
  .why{color:var(--dim);font-size:14px;margin-top:4px}
  .meta{font-size:14px;margin-top:8px;display:flex;flex-wrap:wrap;gap:6px 14px;align-items:baseline}
  .btn{
    display:inline-block;margin-top:12px;padding:9px 14px;border-radius:9px;
    background:var(--accent);color:#151004;font-weight:700;font-size:14px;
  }
  .btn:hover{text-decoration:none;filter:brightness(1.08)}
  /* ON NOW */
  .live-card{border-color:rgba(255,59,48,.45)}
  .live-tag{color:var(--live);font-weight:800;font-size:12px;letter-spacing:.18em;display:inline-flex;align-items:center;gap:7px;margin-bottom:8px}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--live);animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.25}}
  @media (prefers-reduced-motion:reduce){.live-dot{animation:none}}
  .frame{position:relative;aspect-ratio:16/9;border-radius:9px;overflow:hidden;background:#000;margin-top:12px}
  .frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .embed-note{color:var(--dim);font-size:12.5px;margin-top:8px}
  .countdown{font-variant-numeric:tabular-nums;font-weight:800;color:var(--accent)}
  .big-count{font-size:38px;line-height:1.15;margin-top:6px}
  .quiet{color:var(--dim);font-size:15px}
  /* UP NEXT */
  .row{display:flex;gap:12px;align-items:baseline;padding:12px 4px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .row .when{flex:0 0 auto;min-width:148px;color:var(--accent);font-size:13.5px;font-variant-numeric:tabular-nums}
  .row .what{flex:1}
  .row .name{font-weight:650;font-size:15px}
  .row .name .dot{margin-right:6px}
  .row .sub{color:var(--dim);font-size:13px}
  .row .cd{flex:0 0 auto;font-size:13px;color:var(--dim);font-variant-numeric:tabular-nums}
  .radar-badge{font-size:10.5px;letter-spacing:.1em;color:#0a0a0f;background:#c9a227;border-radius:4px;padding:1px 6px;vertical-align:2px;margin-left:8px;font-weight:800}
  /* VAULT */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .vcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .thumb{position:relative;aspect-ratio:16/9;background:#000;cursor:pointer;display:block;width:100%;border:0;padding:0}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;opacity:.85}
  .thumb::after{
    content:"";position:absolute;inset:0;margin:auto;width:54px;height:38px;border-radius:9px;
    background:rgba(10,10,15,.72) url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="%23ececf1" d="M8 5v14l11-7z"/></svg>') center/22px no-repeat;
  }
  .thumb:hover img{opacity:1}
  .vmeta{padding:11px 13px 13px}
  .vmeta .t{font-weight:650;font-size:14.5px;line-height:1.3}
  .vmeta .s{color:var(--dim);font-size:12.5px;margin-top:3px}
  footer{color:var(--dim);font-size:12.5px;text-align:center;border-top:1px solid var(--line);padding-top:18px;line-height:2}
</style>
</head>

/* ?now=2026-07-14T20:00:00Z freezes "now" at load for testing; clock still ticks from there */
const urlNow = new URLSearchParams(location.search).get("now");
const simBase = urlNow ? Date.parse(urlNow) : null;
const loadMs = Date.now();
const NOW = () => simBase !== null ? simBase + (Date.now() - loadMs) : Date.now();

const DOTS = {green:"🟢", yellow:"🟡", red:"🔴"};
const DAY = 86400000;

function el(tag, attrs = {}, ...children){
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)){
    if (k === "class") n.className = v;
    else if (k === "html") n.innerHTML = v;          // trusted build-time strings only
    else n.setAttribute(k, v);
  }
  for (const c of children) if (c != null) n.append(c);
  return n;
}

const fmtLocal = new Intl.DateTimeFormat(undefined,
  {weekday:"short", month:"short", day:"numeric", hour:"numeric", minute:"2-digit", timeZoneName:"short"});
const fmtDay = new Intl.DateTimeFormat(undefined, {weekday:"short", month:"short", day:"numeric"});

function countdown(ms){
  if (ms < 0) return "now";
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400), h = Math.floor(s % 86400 / 3600),
        m = Math.floor(s % 3600 / 60), sec = s % 60;
  const pad = x => String(x).padStart(2, "0");
  if (d > 0) return `${d}d ${h}h ${pad(m)}m`;
  if (h > 0) return `${h}h ${pad(m)}m ${pad(sec)}s`;
  return `${m}m ${pad(sec)}s`;
}

const timed = DATA.events.filter(e => e.start_utc)
  .map(e => ({...e, start: Date.parse(e.start_utc), end: Date.parse(e.end_utc)}))
  .sort((a, b) => a.start - b.start);

function watchButton(ev){
  return ev.link ? el("a", {class:"btn", href:ev.link, target:"_blank", rel:"noopener"},
                      `Watch on the official page →`) : null;
}

function renderOnNow(now){
  const live = timed.filter(e => e.tier === "locked" && e.start <= now && now <= e.end);
  const onNow = document.getElementById("on-now");
  const hero = document.getElementById("next-up-hero");
  const body = document.getElementById("on-now-body");
  const heroBody = document.getElementById("hero-body");
  body.replaceChildren(); heroBody.replaceChildren();

  if (live.length){
    onNow.hidden = false; hero.hidden = true;
    for (const ev of live){
      const card = el("div", {class:"card live-card"},
        el("span", {class:"live-tag"}, el("span", {class:"live-dot"}), "LIVE"),
        el("h3", {}, `${DOTS[ev.watchability]} ${ev.name}`),
        el("div", {class:"why"}, ev.why));
      if (ev.channel_id && ev.watchability === "green"){
        const f = el("div", {class:"frame"});
        f.append(el("iframe", {
          src:`https://www.youtube.com/embed/live_stream?channel=${ev.channel_id}`,
          allow:"autoplay; encrypted-media; picture-in-picture", allowfullscreen:""}));
        card.append(f,
          el("div", {class:"embed-note"}, "Embed dark? The stream is live on the official page below."));
      }
      card.append(watchButton(ev));
      body.append(card);
    }
    return;
  }

  // Nothing live → countdown to the next locked event + a Vault pick
  onNow.hidden = true; hero.hidden = false;
  const next = timed.find(e => e.tier === "locked" && e.start > now);
  if (next){
    heroBody.append(el("div", {class:"card"},
      el("h3", {}, `${DOTS[next.watchability]} ${next.name}`),
      el("div", {class:"why"}, next.why),
      el("div", {class:"big-count countdown", "data-target":next.start}, countdown(next.start - now)),
      el("div", {class:"meta quiet"}, fmtLocal.format(new Date(next.start))),
      watchButton(next)));
  } else {
    heroBody.append(el("div", {class:"card quiet"}, "Silence. Nothing qualifies right now."));
  }
  if (DATA.vault.length){
    const pick = DATA.vault[Math.floor(now / DAY) % DATA.vault.length];
    heroBody.append(el("div", {class:"quiet", style:"margin:16px 0 8px"}, "Meanwhile, from the Vault:"),
                    vaultCard(pick));
  }
}

function renderUpNext(now){
  const body = document.getElementById("up-next-body");
  body.replaceChildren();
  const week = timed.filter(e => e.start > now && e.start <= now + 7 * DAY);
  if (!week.length){
    const next = timed.find(e => e.tier === "locked" && e.start > now);
    body.append(el("div", {class:"quiet"},
      next ? `Silence for the next 7 days. Next: ${next.name} — ${fmtDay.format(new Date(next.start))} (${Math.ceil((next.start - now) / DAY)} days).`
           : "Silence. Nothing qualifies."));
    return;
  }
  for (const ev of week){
    const name = el("span", {class:"name"}, el("span", {class:"dot"}, DOTS[ev.watchability]), ev.name);
    if (ev.tier === "radar") name.append(el("span", {class:"radar-badge"}, "RADAR"));
    body.append(el("div", {class:"row"},
      el("span", {class:"when"}, fmtLocal.format(new Date(ev.start))),
      el("div", {class:"what"}, name,
        el("div", {class:"sub"}, ev.why, " ",
          ev.link ? el("a", {href:ev.link, target:"_blank", rel:"noopener"}, "watch →") : null)),
      el("span", {class:"cd countdown", "data-target":ev.start}, countdown(ev.start - now))));
  }
}

function vaultCard(v){
  const card = el("div", {class:"vcard"});
  const btn = el("button", {class:"thumb", "aria-label":`Play: ${v.title}`});
  btn.append(el("img", {src:`https://i.ytimg.com/vi/${v.video_id}/hqdefault.jpg`, alt:"", loading:"lazy"}));
  btn.addEventListener("click", () => {
    const f = el("div", {class:"frame", style:"margin:0;border-radius:0"});
    f.append(el("iframe", {
      src:`https://www.youtube-nocookie.com/embed/${v.video_id}?autoplay=1&rel=0`,
      allow:"autoplay; encrypted-media; picture-in-picture", allowfullscreen:""}));
    btn.replaceWith(f);
  });
  card.append(btn, el("div", {class:"vmeta"},
    el("div", {class:"t"}, v.title),
    el("div", {class:"s"}, [v.subject, v.date && v.date.slice(0, 4)].filter(Boolean).join(" · ")),
    el("div", {class:"s"}, v.one_liner)));
  return card;
}

function renderVault(){
  const body = document.getElementById("vault-body");
  for (const v of DATA.vault) body.append(vaultCard(v));
}

function tick(){
  const now = NOW();
  for (const n of document.querySelectorAll("[data-target]"))
    n.textContent = countdown(Number(n.dataset.target) - now);
}

function render(){
  const now = NOW();
  renderOnNow(now);
  renderUpNext(now);
}

render();
renderVault();
setInterval(tick, 1000);
setInterval(render, 60000);
</script>
