<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#07070b">
<title>PINNACLE</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Spline+Sans+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07070b; --panel:#10101a; --panel-2:#151522; --fg:#f2f0ea; --dim:#93939e;
    --line:#23232e; --accent:#e8b44f; --accent-dim:#c9a227; --live:#ff3b30;
    --display:"Barlow Condensed", -apple-system, sans-serif;
    --mono:"Spline Sans Mono", ui-monospace, SFMono-Regular, monospace;
    color-scheme:dark;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);color:var(--fg);
    font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    max-width:1480px;margin:0 auto;
    padding:clamp(20px,3vw,44px) clamp(16px,4vw,56px) 72px;
    -webkit-font-smoothing:antialiased;
  }
  /* stadium-glow atmosphere + faint grain */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;
    background:
      radial-gradient(1100px 540px at 72% -160px, rgba(232,180,79,.09), transparent 62%),
      radial-gradient(900px 560px at -8% 12%, rgba(64,76,128,.09), transparent 60%),
      var(--bg);
  }
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;opacity:.05;
    background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2"/></filter><rect width="160" height="160" filter="url(%23n)" opacity=".6"/></svg>');
  }
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  /* HEADER */
  header{
    display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;
    gap:6px 24px;margin-bottom:clamp(28px,4vw,52px);
    border-bottom:1px solid var(--line);padding-bottom:18px;position:relative;
  }
  header::after{content:"";position:absolute;left:0;bottom:-1px;width:72px;height:2px;background:var(--accent)}
  .wordmark{
    font-family:var(--display);font-weight:700;
    font-size:clamp(34px,4.6vw,58px);line-height:1;
    letter-spacing:.22em;text-indent:.02em;
  }
  .tagline{color:#b8b8c2;font-size:12px;letter-spacing:.26em;text-transform:uppercase;padding-bottom:6px}

  section{margin-bottom:clamp(36px,4.5vw,60px)}
  h2{
    font-family:var(--display);font-size:17px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;
    color:var(--dim);display:flex;align-items:center;gap:12px;margin-bottom:16px;
  }
  h2::before{content:"";width:22px;height:2px;background:var(--accent);flex:0 0 auto}
  h2::after{content:"";flex:1;height:1px;background:var(--line)}

  .card{
    background:linear-gradient(160deg,var(--panel-2),var(--panel) 55%);
    border:1px solid var(--line);border-radius:14px;
    padding:clamp(16px,2vw,26px);margin-bottom:12px;
  }
  .card h3{
    font-family:var(--display);font-weight:700;letter-spacing:.01em;
    font-size:clamp(22px,2.4vw,34px);line-height:1.08;
  }
  .card h3 .dot{font-size:.62em;position:relative;top:-.14em;margin-right:10px}
  .why{color:var(--dim);font-size:14.5px;margin-top:8px;max-width:64ch}
  .meta{font-size:14px;margin-top:8px;display:flex;flex-wrap:wrap;gap:6px 14px;align-items:baseline}
  .btn{
    display:inline-block;align-self:flex-start;margin-top:14px;padding:11px 22px;border-radius:9px;
    background:var(--accent);color:#151004;font-weight:700;font-size:14px;letter-spacing:.02em;
    transition:filter .15s ease, transform .15s ease;
  }
  .btn:hover{text-decoration:none;filter:brightness(1.08);transform:translateY(-1px)}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  .thumb:focus-visible{outline-offset:-3px}

  /* ON NOW: live card(s) left, vault rail right on wide screens */
  #on-now-body{display:grid;gap:22px}
  @media (min-width:1100px){
    #on-now-body{grid-template-columns:1.15fr .85fr;align-items:stretch}
    .live-stack{height:100%}
    .live-card{height:100%}
    /* headline top, action pinned low — same grammar as the idle hero */
    .live-card .btn{margin-top:auto}
  }
  .live-stack{display:grid;gap:20px;min-width:0}
  .live-card{border-color:rgba(255,59,48,.45);margin-bottom:0;display:flex;flex-direction:column}
  .live-tag{color:var(--live);font-weight:800;font-size:12px;letter-spacing:.18em;display:inline-flex;align-items:center;gap:7px;margin-bottom:8px}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--live);animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.25}}
  .frame{position:relative;aspect-ratio:16/9;border-radius:9px;overflow:hidden;background:#000;margin-top:12px}
  .frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .embed-note{color:var(--dim);font-size:12.5px;margin-top:8px}

  .countdown{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:700;color:var(--accent)}
  .big-count{font-size:clamp(40px,5.2vw,84px);line-height:1.1;letter-spacing:-.02em}
  .big-count .u{font-size:.5em;color:var(--accent-dim);font-weight:500;margin-right:.14em}
  .count-label{font-family:var(--mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);margin-top:14px}
  .quiet{color:var(--dim);font-size:15px}
  .arr{font-family:var(--mono);font-size:.72em;color:var(--dim);padding:0 .28em;position:relative;top:-.05em}
  .row .arr{font-size:11px}  /* floor — at list scale .72em reads as a hyphen */

  /* HERO: countdown + featured vault pick side by side on wide screens */
  #hero-body{display:grid;gap:22px}
  .hero-next .card{margin-bottom:0;display:flex;flex-direction:column}
  .big-count{margin-top:4px}
  @media (min-width:980px){
    #hero-body{grid-template-columns:1.15fr .85fr;align-items:stretch}
    .hero-next .card{
      height:100%;justify-content:flex-start;
      padding:clamp(24px,3vw,44px);
    }
    /* headline top, eyebrow + clock anchored to the lower third — broadcast composition */
    .hero-next .card .count-label{margin-top:auto;padding-top:22px}
  }
  .vlead{
    font-family:var(--display);font-size:13.5px;font-weight:600;letter-spacing:.24em;
    text-transform:uppercase;color:var(--dim);margin:0 0 10px;
    display:flex;align-items:center;gap:10px;
  }
  .vlead::before{content:"";width:14px;height:2px;background:var(--accent)}
  @media (max-width:979px){.hero-vault{margin-top:4px}}

  /* LISTS: Up Next + Just Ended share the width on desktop when both present */
  .lists{display:grid;gap:0 56px;align-items:start}
  @media (min-width:1120px){
    .lists:has(#just-ended:not([hidden])){grid-template-columns:1.35fr 1fr}
  }
  .row{display:flex;gap:14px;align-items:baseline;padding:13px 4px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .row .when{flex:0 0 auto;min-width:150px;color:#8a8a97;font-family:var(--mono);font-size:13px;font-variant-numeric:tabular-nums}
  .row .what{flex:1}
  .row .name{font-weight:650;font-size:15.5px}
  .row .name .dot{margin-right:6px}
  .row .sub{color:var(--dim);font-size:13px;max-width:70ch}
  .row .sub a{display:inline-block;padding:6px 4px;margin:-6px -4px}
  .row .cd{flex:0 0 auto;font-size:13px;color:var(--dim)}
  .radar-badge{font-size:10.5px;letter-spacing:.1em;color:#0a0a0f;background:var(--accent-dim);border-radius:4px;padding:1px 6px;vertical-align:2px;margin-left:8px;font-weight:800}
  /* small screens: date + countdown share the top line, title gets full width below.
     Must sit AFTER every base .row rule — .row .what{flex:1} would win the cascade otherwise. */
  @media (max-width:640px){
    .row{flex-wrap:wrap;gap:4px 12px}
    .row .when{order:1;min-width:0;flex:0 0 auto}
    .row .cd{order:2;margin-left:auto}
    .row .what{order:3;flex:1 1 100%}
  }
  @media (max-width:360px){
    .row .when,.row .cd{font-size:12px}  /* SE-class phones: keep the date+countdown line from wrapping */
  }

  /* VAULT */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px}
  .vcard{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;
    transition:transform .18s ease, border-color .18s ease;
  }
  .vcard:hover{transform:translateY(-3px);border-color:#3a3a4a}
  .thumb{position:relative;aspect-ratio:16/9;background:#000;cursor:pointer;display:block;width:100%;border:0;padding:0}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;opacity:.85;transition:opacity .18s ease}
  .thumb::after{
    content:"";position:absolute;inset:0;margin:auto;width:54px;height:38px;border-radius:9px;
    background:rgba(10,10,15,.72) url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="%23ececf1" d="M8 5v14l11-7z"/></svg>') center/22px no-repeat;
  }
  .thumb:hover img{opacity:1}
  .vmeta{padding:12px 14px 14px}
  .vmeta .t{font-weight:650;font-size:14.5px;line-height:1.3}
  .vmeta .s{color:var(--dim);font-size:12.5px;margin-top:3px}

  /* JUST ENDED — result is the bright element; gold stays on the action link */
  .result{color:var(--fg);font-weight:700}

  /* FEATURED PICK + FRESHNESS */
  .vcard.featured .t{font-family:var(--display);font-size:clamp(20px,1.8vw,25px);font-weight:600;letter-spacing:.01em}
  .vcard.featured .s{font-size:13.5px}
  .vcard.featured .vmeta{padding:14px 18px 18px}
  .cat-badge{display:inline-block;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#151004;background:var(--accent);border-radius:4px;padding:2px 7px;font-weight:800;margin-bottom:7px}
  .new-badge{font-size:10.5px;letter-spacing:.1em;color:#151004;background:var(--accent);border-radius:4px;padding:1px 6px;margin-left:8px;font-weight:800;vertical-align:middle}
  @keyframes flash-pulse{50%{border-color:var(--accent);box-shadow:0 0 0 2px rgba(232,180,79,.35)}}
  .vcard.flash{animation:flash-pulse .7s ease-in-out 3}

  /* entrance: one staggered rise on load */
  @media (prefers-reduced-motion:no-preference){
    header, main > *{animation:rise .55s cubic-bezier(.2,.7,.3,1) both}
    main > *:nth-child(1){animation-delay:.05s}
    main > *:nth-child(2){animation-delay:.1s}
    main > *:nth-child(3){animation-delay:.15s}
    main > *:nth-child(4){animation-delay:.2s}
    main > *:nth-child(5){animation-delay:.25s}
  }
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){
    .live-dot{animation:none}
    .vcard.flash{animation:none;border-color:var(--accent)}
    .vcard:hover{transform:none}
  }

  footer{color:var(--dim);font-size:12.5px;text-align:center;border-top:1px solid var(--line);padding-top:20px;line-height:2}
  footer .legend{font-family:var(--mono);font-size:11px;letter-spacing:.08em}
</style>
</head>
<body>
<header>
  <div class="wordmark">PINNACLE</div>
  <div class="tagline">Only the pinnacle. Most days: silence.</div>
</header>

<main>
  <section id="on-now" hidden><h2>On Now</h2><div id="on-now-body"></div></section>
  <section id="next-up-hero" hidden><h2>Next Up</h2><div id="hero-body"></div></section>
  <div class="lists">
    <section><h2>Up Next — 7 Days</h2><div id="up-next-body"></div></section>
    <section id="just-ended" hidden><h2>Just Ended</h2><div id="just-ended-body"></div></section>
  </div>
  <section><h2>The Vault</h2><div class="grid" id="vault-body"></div></section>
</main>

const urlNow = new URLSearchParams(location.search).get("now");
const simBase = urlNow ? Date.parse(urlNow) : null;
const loadMs = Date.now();
const NOW = () => simBase !== null ? simBase + (Date.now() - loadMs) : Date.now();

const DOTS = {green:"🟢", yellow:"🟡", red:"🔴"};
const DOT_TITLES = {green:"Free live broadcast", yellow:"Highlights only", red:"Premium/subscription"};
const DAY = 86400000;
const dotEl = w => el("span", {class:"dot", title:DOT_TITLES[w]}, DOTS[w]);

/* Barlow Condensed has no U+2192 — style route arrows in the mono so they read as
   wayfinding instead of a mismatched system-font fallback glyph. */
function withArrows(text){
  const parts = String(text).split(" → "), out = [];
  parts.forEach((p, i) => { if (i) out.push(el("span", {class:"arr"}, "→")); out.push(p); });
  return out;
}

function el(tag, attrs = {}, ...children){
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)){
    if (k === "class") n.className = v;
    else if (k === "html") n.innerHTML = v;          // trusted build-time strings only
    else n.setAttribute(k, v);
  }
  for (const c of children) if (c != null) n.append(c);
  return n;
}

function countdown(ms){
  if (ms < 0) return "now";
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400), h = Math.floor(s % 86400 / 3600),
        m = Math.floor(s % 3600 / 60), sec = s % 60;
  const pad = x => String(x).padStart(2, "0");
  if (d > 0) return `${d}d ${h}h ${pad(m)}m`;
  if (h > 0) return `${h}h ${pad(m)}m ${pad(sec)}s`;
  return `${m}m ${pad(sec)}s`;
}

/* hero clock only: digits dominate, unit letters annotate (safe — numeric content only) */
function countdownHTML(ms){
  const text = countdown(ms);
  return text === "now" ? text : text.replace(/([a-z]+)/g, '<span class="u">$1</span>');
}

const timed = DATA.events.filter(e => e.start_utc)
  .map(e => ({...e, start: Date.parse(e.start_utc), end: Date.parse(e.end_utc)}))
  .sort((a, b) => a.start - b.start);

function watchButton(ev){
  return ev.link ? el("a", {class:"btn", href:ev.link, target:"_blank", rel:"noopener"},
                      `Watch on the official page →`) : null;
}

function renderOnNow(now){
  const live = timed.filter(e => e.tier === "locked" && e.start <= now && now <= e.end);
  const onNow = document.getElementById("on-now");
  const hero = document.getElementById("next-up-hero");
  const body = document.getElementById("on-now-body");
  const heroBody = document.getElementById("hero-body");
  body.replaceChildren(); heroBody.replaceChildren();

  if (live.length){
    onNow.hidden = false; hero.hidden = true;
    const stack = el("div", {class:"live-stack"});
    for (const ev of live){
      const card = el("div", {class:"card live-card"},
        el("span", {class:"live-tag"}, el("span", {class:"live-dot"}), "LIVE"),
        el("h3", {}, dotEl(ev.watchability), ...withArrows(ev.name)),
        el("div", {class:"why"}, ev.why),
        el("div", {class:"count-label"}, `Live · ${countdown(now - ev.start).replace(/ \d+s$/, "")} in`));
      if (ev.channel_id && ev.watchability === "green"){
        const f = el("div", {class:"frame"});
        f.append(el("iframe", {
          src:`https://www.youtube.com/embed/live_stream?channel=${ev.channel_id}`,
          allow:"autoplay; encrypted-media; picture-in-picture", allowfullscreen:""}));
        card.append(f,
          el("div", {class:"embed-note"}, "Embed dark? The stream is live on the official page below."));
      }
      card.append(watchButton(ev));
      stack.append(card);
    }
    body.append(stack);
    // the live state keeps the vault rail — never waste the right column
    if (DATA.vault.length){
      body.append(el("div", {class:"hero-vault"},
        el("div", {class:"vlead"}, "From the Vault"),
        vaultCard(dailyPick(now), true)));
    }
    return;
  }

  // Nothing live → countdown to the next locked event + a Vault pick, side by side on desktop
  onNow.hidden = true; hero.hidden = false;
  const next = timed.find(e => e.tier === "locked" && e.start > now);
  const nextWrap = el("div", {class:"hero-next"});
  if (next){
    nextWrap.append(el("div", {class:"card"},
      el("h3", {}, dotEl(next.watchability), ...withArrows(next.name)),
      el("div", {class:"why"}, next.why),
      el("div", {class:"count-label"}, "Starts in"),
      el("div", {class:"big-count countdown", "data-target":next.start, html:countdownHTML(next.start - now)}),
      el("div", {class:"meta quiet"}, fmtLocal.format(new Date(next.start))),
      watchButton(next)));
  } else {
    nextWrap.append(el("div", {class:"card quiet"}, "Silence. Nothing qualifies right now."));
  }
  heroBody.append(nextWrap);
  if (DATA.vault.length){
    heroBody.append(el("div", {class:"hero-vault"},
      el("div", {class:"vlead"}, "From the Vault"),
      vaultCard(dailyPick(now), true)));
  }
}

/* Deterministic fresh-weighted daily pick — pure function of the UTC day number,
   so every viewer worldwide sees the same featured entry. Freshness keys off the
   performance date, not `verified` (a link-check stamp that re-verification moves). */
const FRESH_MS = 14 * DAY;
const isFresh = (v, now) => v.date && now - Date.parse(v.date) < FRESH_MS;
function dailyPick(now){
  const day = Math.floor(now / DAY);
  const fresh = DATA.vault.filter(v => isFresh(v, now));
  const premiere = fresh.filter(v => now - Date.parse(v.date) < 4 * DAY);
  if (premiere.length) return premiere[0];                 // brand-new entry premieres ~48h
  if (fresh.length && day % 2 === 0) return fresh[(day >> 1) % fresh.length]; // fresh own even days
  return DATA.vault[day % DATA.vault.length];              // classic full cycle otherwise
}

const vaultByEvent = new Map(DATA.vault.filter(v => v.event_id).map(v => [v.event_id, v]));

function renderJustEnded(now){
  const sec = document.getElementById("just-ended");
  const body = document.getElementById("just-ended-body");
  const ended = timed.filter(e => e.tier === "locked" && e.end < now && e.end >= now - 7 * DAY)
                     .sort((a, b) => b.end - a.end);
  sec.hidden = !ended.length;
  body.replaceChildren();
  for (const ev of ended){
    const days = Math.floor((now - ev.end) / DAY);
    const ago = days < 1 ? "today" : `${days}d ago`;
    const name = el("span", {class:"name"}, dotEl(ev.watchability), ...withArrows(ev.name));
    const sub = el("div", {class:"sub"});
    if (ev.result) sub.append(el("span", {class:"result"}, ev.result));
    const v = vaultByEvent.get(ev.id);
    if (v){
      const a = el("a", {href:"#vault-" + v.id}, "Watch the highlight →");
      a.addEventListener("click", e => { e.preventDefault(); playVaultEntry(v.id); });
      if (ev.result) sub.append(" · ");
      sub.append(a);
    }
    body.append(el("div", {class:"row"},
      el("span", {class:"when"}, `${fmtDay.format(new Date(ev.end))} · ${ago}`),
      el("div", {class:"what"}, name, sub)));
  }
}

function playVaultEntry(id){
  // grid card, or the featured copy when the day's pick is deduped out of the grid
  const card = document.getElementById("vault-" + id) ||
               document.querySelector(`.vcard.featured[data-vid="${id}"]`);
  if (!card) return;
  card.scrollIntoView({behavior:"smooth", block:"center"});
  card.classList.add("flash");
  setTimeout(() => card.classList.remove("flash"), 2200);
  const btn = card.querySelector(".thumb");
  if (btn) btn.click();  // inside the user's click gesture → autoplay embed swap
}

function renderUpNext(now){
  const body = document.getElementById("up-next-body");
  body.replaceChildren();
  const week = timed.filter(e => e.start > now && e.start <= now + 7 * DAY);
  if (!week.length){
    const next = timed.find(e => e.tier === "locked" && e.start > now);
    body.append(el("div", {class:"quiet"},
      next ? `Silence for the next 7 days. Next: ${next.name} — ${fmtDay.format(new Date(next.start))} (${Math.ceil((next.start - now) / DAY)} days).`
           : "Silence. Nothing qualifies."));
    return;
  }
  for (const ev of week){
    const name = el("span", {class:"name"}, dotEl(ev.watchability), ...withArrows(ev.name));
    if (ev.tier === "radar") name.append(el("span", {class:"radar-badge"}, "RADAR"));
    body.append(el("div", {class:"row"},
      el("span", {class:"when"}, fmtLocal.format(new Date(ev.start))),
      el("div", {class:"what"}, name,
        el("div", {class:"sub"}, ev.why, " ",
          ev.link ? el("a", {href:ev.link, target:"_blank", rel:"noopener"}, "watch →") : null)),
      el("span", {class:"cd countdown", "data-target":ev.start}, countdown(ev.start - now))));
  }
}

function vaultCard(v, featured = false){
  // grid cards carry the anchor id; the featured copy carries data-vid for the fallback lookup
  const card = el("div", featured ? {class:"vcard featured", "data-vid":v.id} : {class:"vcard", id:"vault-" + v.id});
  const btn = el("button", {class:"thumb", "aria-label":`Play: ${v.title}`});
  btn.append(el("img", {src:`https://i.ytimg.com/vi/${v.video_id}/hqdefault.jpg`, alt:"", loading:"lazy"}));
  btn.addEventListener("click", () => {
    const f = el("div", {class:"frame", style:"margin:0;border-radius:0"});
    f.append(el("iframe", {
      src:`https://www.youtube-nocookie.com/embed/${v.video_id}?autoplay=1&rel=0`,
      allow:"autoplay; encrypted-media; picture-in-picture", allowfullscreen:""}));
    btn.replaceWith(f);
  });
  const title = el("div", {class:"t"}, v.title);
  if (isFresh(v, NOW())) title.append(el("span", {class:"new-badge"}, "NEW"));
  const meta = el("div", {class:"vmeta"});
  if (featured && v.category) meta.append(el("div", {}, el("span", {class:"cat-badge"}, v.category)));
  meta.append(title,
    el("div", {class:"s"}, [v.subject, v.date && v.date.slice(0, 4)].filter(Boolean).join(" · ")),
    el("div", {class:"s"}, v.one_liner));
  card.append(btn, meta);
  return card;
}

let gridPickId = null;  // the pick currently deduped out of the grid

function renderVault(){
  const body = document.getElementById("vault-body");
  body.replaceChildren();
  // the day's featured pick lives in the hero/live rail — skip its grid copy to avoid an instant repeat
  gridPickId = DATA.vault.length ? dailyPick(NOW()).id : null;
  for (const v of DATA.vault) if (v.id !== gridPickId) body.append(vaultCard(v));
}

function tick(){
  const now = NOW();
  for (const n of document.querySelectorAll("[data-target]")){
    const ms = Number(n.dataset.target) - now;
    if (n.classList.contains("big-count")) n.innerHTML = countdownHTML(ms);
    else n.textContent = countdown(ms);
  }
}

function render(){
  const now = NOW();
  renderOnNow(now);
  renderUpNext(now);
  renderJustEnded(now);
  // UTC-day rollover while the page sits open: rebuild the grid around the new pick
  const pid = DATA.vault.length ? dailyPick(now).id : null;
  if (pid !== gridPickId) renderVault();
}

renderVault();
render();
setInterval(tick, 1000);
setInterval(render, 60000);
</script>
</body>
</html>
